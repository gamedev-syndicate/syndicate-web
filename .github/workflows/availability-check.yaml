name: Website Availability Check

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest
    steps:
      - name: Check gamedevsyndicate.com availability
        run: |
          set -e
          response=$(curl -s -o /dev/null -w "%{http_code}" https://www.gamedevsyndicate.com)
          if [ "$response" -ne 200 ]; then
            echo "Site is DOWN! Status: $response"
            exit 1
          else
            echo "Site is UP. Status: $response"
          fi
