name: Weekly Sanity Backup

on:
  schedule:
    # Cron syntax: Minute Hour DayOfMonth Month DayOfWeek
    # 0 = Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Adds a "Run workflow" button for manual testing

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Sanity CLI
        run: npm install -g @sanity/cli

      - name: Export Dataset
        working-directory: gamedevsyndicate
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: |
          # Get today's date
          timestamp=$(date +%Y-%m-%d)
          
          # Run the export
          # Replace 'production' below if your dataset name is different
          sanity dataset export production backup-weekly-$timestamp.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanity-backup-sunday-${{ github.run_id }}
          path: gamedevsyndicate/*.tar.gz
          retention-days: 30